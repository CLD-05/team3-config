#base/secret.yaml

apiVersion: v1
kind: Secret
metadata:
  name: team3-app-secret
  namespace: app
  labels:
    app: foldy   # [리팩토링] 라벨 누락 → 추가
type: Opaque
stringData:
  # 실제값은 git 에 두지 않음. 클러스터에 kubectl 로 직접 주입.
  # ArgoCD 는 ignoreDifferences 로 data 를 무시하도록 설정됨.
  DB_URL: "PLACEHOLDER"
  DB_USERNAME: "PLACEHOLDER"
  DB_PASSWORD: "PLACEHOLDER"
  JWT_SECRET_KEY: "PLACEHOLDER"
