#base/serviceaccount.yaml

apiVersion: v1
kind: ServiceAccount
metadata:
  name: app-sa
  namespace: app
  labels:
    app: foldy   # [리팩토링] 라벨 누락 → 추가
  annotations:
    # [리팩토링] dev IRSA Role ARN 하드코딩 제거 → overlay 에서 환경별 patch.
    # base 에 dev role-arn 이 박혀 있으면 prod 에서 dev 의 IAM Role 을 쓰게 됨(권한 격리 깨짐)
    eks.amazonaws.com/role-arn: "PLACEHOLDER_OVERRIDDEN_BY_OVERLAY"