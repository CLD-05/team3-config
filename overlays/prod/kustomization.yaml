apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

patches:
  - path: patch-replicas.yaml

images:
  - name: foldy-app
    newName: 495599735720.dkr.ecr.ap-northeast-2.amazonaws.com/team3/foldy
    newTag: PLACEHOLDER  # CI/CD에서 git SHA로 자동 갱신

secretGenerator:
  - name: team3-app-secret
    behavior: replace
    type: Opaque
    literals:
      - DB_URL=$PROD_DB_URL # 아직 Actions secrets and variables 등록안함
      - DB_USERNAME=$PROD_DB_USERNAME # 아직 Actions secrets and variables 등록안함
      - DB_PASSWORD=$PROD_DB_PASSWORD # 아직 Actions secrets and variables 등록안함
      - JWT_SECRET=$PROD_DB_JWT_SECRET # 아직 Actions secrets and variables 등록안함