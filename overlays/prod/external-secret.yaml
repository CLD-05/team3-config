#prod/external-secret.yaml

# ─────────────────────────────────────────────────────────────
# External Secrets Operator (ESO) 설정
#
# 목적: AWS Secrets Manager 의 시크릿을 읽어 k8s Secret 을 자동 생성/동기화.
#       kubectl 수동 주입 + placeholder 덮어쓰기 문제를 근본 해결.
#
# 사전 준비(완료됨):
#   - Secrets Manager 키: team3/prod/foldy-app
#     (DB_URL, DB_USERNAME, DB_PASSWORD, JWT_SECRET_KEY 4개 들어있음)
#   - app-sa (IRSA) 에 secretsmanager:GetSecretValue 권한 부여됨
#   - ESO 설치됨 (external-secrets 네임스페이스)
#
# 작성할 것 2개:
#
# 1) SecretStore (kind: SecretStore, namespace: app)
#    - provider.aws.service: SecretsManager
#    - provider.aws.region:  ap-northeast-2
#    - auth 는 IRSA 방식(jwt) → serviceAccountRef 로 app-sa 지정
#    - 힌트: spec.provider.aws.auth.jwt.serviceAccountRef.name = app-sa
#
# 2) ExternalSecret (kind: ExternalSecret, namespace: app)
#    - secretStoreRef 로 위 SecretStore 연결
#    - target.name = team3-app-secret  (앱이 envFrom 으로 읽는 그 이름)
#    - target.creationPolicy = Owner
#    - Secrets Manager 키 전체를 가져오려면 spec.dataFrom.extract.key = team3/prod/foldy-app
#    - refreshInterval 예: 1h
#
# 참고 문서: https://external-secrets.io/latest/provider/aws-secrets-manager/
# apiVersion 은 external-secrets.io/v1beta1 사용
#
# ⚠️ 적용 순서 주의: 기존에 kubectl 로 만든 team3-app-secret 이 있으면
#    ExternalSecret 이 인수(덮어쓰기)하도록 처리 필요. (담당자끼리 상의)
# ─────────────────────────────────────────────────────────────

# 여기에 SecretStore 작성
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: aws-secretsmanager
  namespace: app
spec:
  provider:
    aws:
      service: SecretsManager
      region: ap-northeast-2
      auth:
        jwt:
          serviceAccountRef:
            name: app-sa

# 여기에 ExternalSecret 작성

apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: team3-app-external-secret
  namespace: app
spec:
  refreshInterval: 1h           # 1시간마다 AWS Secrets Manager와 동기화
  secretStoreRef:
    name: aws-secretsmanager    # 위에서 정의한 SecretStore 이름과 매칭
    kind: SecretStore
  target:
    name: team3-app-secret      # 애플리케이션 Pod가 envFrom으로 바라볼 최종 K8s Secret 이름
    creationPolicy: Owner       # ExternalSecret이 삭제되면 K8s Secret도 함께 삭제되도록 설정
  dataFrom:
    - extract:
        key: team3/prod/foldy-app # AWS Secrets Manager에 저장된 Secret Name (전체 Key-Value 추출)