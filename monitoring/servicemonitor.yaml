apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: foldy
  namespace: monitoring # Prometheus와 같은 네임스페이스
  labels:
    release: monitoring # 설치한 Helm Release 이름
spec:
  namespaceSelector:
    matchNames:
      - app
  selector:
    matchLabels:
      app: foldy # base/service.yaml의 라벨과 일치
  endpoints:
    - port: http # Service에서 정의한 포트 name
      path: /actuator/prometheus
      interval: 15s
      scrapeTimeout: 10s
