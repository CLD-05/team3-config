
# ─────────────────────────────────────────────────────────────
# Grafana ALB Ingress
#
# 목적: Grafana UI 를 ALB 로 외부 노출 (발표 때 대시보드 시연용)
# 방식: 앱/ArgoCD ingress 와 동일 (ALB Controller, HTTP, 도메인 없음)
#
# 작성할 항목(힌트):
#   - kind: Ingress, namespace: monitoring
#   - annotations:
#       alb.ingress.kubernetes.io/scheme: internet-facing
#       alb.ingress.kubernetes.io/target-type: ip
#       alb.ingress.kubernetes.io/load-balancer-name: team3-grafana-alb
#       alb.ingress.kubernetes.io/healthcheck-path: /api/health   (Grafana 헬스 경로)
#   - ingressClassName: alb
#   - backend service: monitoring-grafana (Helm 설치 시 생성되는 grafana svc 이름 확인 필요)
#       port: 80
#
# ⚠️ service 이름은 helm install 후 `kubectl get svc -n monitoring` 로 확인.
#    릴리스명에 따라 monitoring-grafana 또는 다른 이름일 수 있음.
#
# 참고: values.yaml 의 grafana.ingress 로 처리하면 이 파일 불필요. 둘 중 한 방식만.
# ─────────────────────────────────────────────────────────────

