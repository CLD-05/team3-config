# ── Grafana ──────────────────────────────────────────────────
grafana:
  adminPassword: "foldy-grafana-2026"
  ingress:
    enabled: false
  persistence:
    enabled: false
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 1000m       # 6명 동시 접속 대응
      memory: 1Gi
  # 대시보드 자동 provisioning (코드로 관리)
  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: 'default'
          orgId: 1
          folder: ''
          type: file
          disableDeletion: false
          editable: true
          options:
            path: /var/lib/grafana/dashboards/default
  dashboards:
    default:
      jvm-micrometer:
        gnetId: 4701
        revision: 9
        datasource: Prometheus
      spring-boot-statistics:
        gnetId: 12900
        revision: 1
        datasource: Prometheus
# ── Prometheus ───────────────────────────────────────────────
prometheus:
  prometheusSpec:
    retention: 7d
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: 500m
        memory: 1Gi
    storageSpec:
      emptyDir:
        medium: ""
    serviceMonitorSelectorNilUsesHelmValues: false
# ── AlertManager ─────────────────────────────────────────────
alertmanager:
  enabled: false
# ── 경량 컴포넌트 ─────────────────────────────────────────────
kubeStateMetrics:
  enabled: true
nodeExporter:
  enabled: true
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi
