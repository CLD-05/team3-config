
# ─────────────────────────────────────────────────────────────
# kube-prometheus-stack Helm values

# 설치: helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
#       helm install monitoring prometheus-community/kube-prometheus-stack \
#         -n monitoring --create-namespace -f values.yaml
#
# ⚠️ 노드 2개(t3.medium)뿐이라 자원 빠듯함. 가볍게 잡을 것.
#
# 작성할 항목(힌트):
#
# grafana:
#   adminPassword: (Grafana admin 비번 — 평문 말고 추후 secret 권장)
#   ingress: (Grafana 외부 노출 — 별도 grafana-ingress.yaml 로 빼도 됨)
#   resources: (requests/limits — 작게)
#   # 기본 대시보드 자동 설치됨 (kube, node 등)
#
# prometheus:
#   prometheusSpec:
#     retention: (메트릭 보존 기간 — 예: 7d, 학습용이라 짧게)
#     resources: (requests/limits — 작게)
#     storageSpec: (PVC — EBS. 안 쓰면 emptyDir 로 임시. 재시작 시 메트릭 날아감 주의)
#     # serviceMonitorSelectorNilUsesHelmValues: false  ← 외부 ServiceMonitor 인식하려면 필요할 수 있음
#
# alertmanager:
#   enabled: (알람 안 쓰면 false 로 꺼서 자원 절약)
#
# 자원 부족하면 끌 것 후보:
#   - kubeStateMetrics, nodeExporter 는 가벼우니 유지
#   - alertmanager, grafana persistence 는 선택
#
# 참고: https://github.com/prometheus-community/helm-charts/tree/main/charts/kube-prometheus-stack
# ─────────────────────────────────────────────────────────────

# ── Grafana ──────────────────────────────────────────────────
grafana:
  # 추후 k8s Secret으로 교체 권장
  adminPassword: "foldy-grafana-2026"

  # 외부 노출은 grafana-ingress.yaml 에서 별도 처리
  ingress:
    enabled: false

  # 학습용 — 재시작 시 설정 초기화됨 (비용 절약)
  persistence:
    enabled: false

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

# ── Prometheus ───────────────────────────────────────────────
prometheus:
  prometheusSpec:
    # 학습용이라 짧게 설정 (기본 15d → 7d로 단축)
    retention: 7d

    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: 500m
        memory: 1Gi

    # emptyDir: 재시작 시 메트릭 날아감 — 학습용으로 충분
    storageSpec:
      emptyDir:
        medium: ""

    # foldy ServiceMonitor 인식하려면 필요
    serviceMonitorSelectorNilUsesHelmValues: false

# ── AlertManager ─────────────────────────────────────────────
# 자원 절약 — 알람 기능 미사용
alertmanager:
  enabled: false

# ── 경량 컴포넌트 — 유지 ──────────────────────────────────────
kubeStateMetrics:
  enabled: true  # k8s 리소스 메트릭 (Pod, Deployment 상태 등)

nodeExporter:
  enabled: true  # 노드 시스템 메트릭 (CPU, 메모리, 디스크)
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi
