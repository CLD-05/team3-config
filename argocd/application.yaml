# argocd/application.yaml
### foldy-prod
# dev 는 폐기됨. prod 단일 운영.
# 가이드 권장: 학습 단계는 manual sync (automated/selfHeal 비활성화)
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: foldy-prod
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/CLD-05/team3-config.git
    targetRevision: main
    path: overlays/prod/
  destination:
    server: https://kubernetes.default.svc
    namespace: app
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
  # 실제 시크릿은 클러스터에 직접 주입(kubectl), git 엔 placeholder.
  ignoreDifferences:
    - group: ""
      kind: Secret
      name: team3-app-secret
      namespace: app
      jsonPointers:
        - /data
